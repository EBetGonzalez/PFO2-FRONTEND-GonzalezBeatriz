<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt - PFO2</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("Img/fotoCancha.jpg") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
      color: #1f2937;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 48px);
    }

    .card {
      width: 100%;
      max-width: 1000px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      padding: 24px;
      backdrop-filter: blur(4px);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .top-bar h1 {
      margin: 0;
      font-size: 1.6rem;
      color: #0053A0;
    }

    .back-link {
      text-decoration: none;
      color: #fff;
      background: #0053A0;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .back-link:hover {
      background: #003f73;
    }

    iframe {
      width: 100%;
      min-height: 70vh;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="top-bar">
        <h1>Prompt de la práctica</h1>
        <a class="back-link" href="index.html">← Volver al index</a>
      </div>
      <iframe src="Prompt.txt" title="Contenido del Prompt"></iframe>
    </div>
  </div>
</body>
</html>
